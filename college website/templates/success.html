<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Submitted</title>

<style>
/* Body & Container */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #fff;
  padding: 40px 50px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.15);
}

/* Heading */
h2 {
  color: #222;
  font-size: 28px;
  margin-bottom: 25px;
}

/* Buttons */
.button {
  display: inline-block;
  padding: 10px 20px;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 6px;
  transition: all 0.3s ease;
}

.button:hover {
  background: linear-gradient(135deg, #3a8ef6, #00d2f7);
  transform: translateY(-2px);
  box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}
</style>

</head>
<body>
<div class="container">
    <h2>✅ Application Submitted Successfully!</h2>
    <a href="/" class="button">Back to Home</a>
    <a href="/admin" class="button" style="margin-left:10px;">Admin Panel</a>
</div>
</body>
</html>
