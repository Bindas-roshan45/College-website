<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sign Up</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #4e54c8, #8f94fb, #6a11cb, #2575fc);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .signup-container {
        background: #fff;
        padding: 40px 50px;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        width: 360px;
        text-align: center;
    }

    .signup-container h2 {
        margin-bottom: 25px;
        color: #333;
        font-size: 26px;
    }

    .signup-container input {
        width: 100%;
        padding: 14px 15px;
        margin: 12px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 16px;
        transition: 0.3s;
    }

    .signup-container input:focus {
        border-color: #4e54c8;
        box-shadow: 0 0 10px rgba(78, 84, 200, 0.5);
    }

    .signup-container button {
        width: 100%;
        padding: 14px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #4e54c8;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    .signup-container button:hover {
        background: #3b40a0;
    }

    .login-link {
        margin-top: 10px;
        font-size: 14px;
    }

    .login-link a {
        color: #4e54c8;
        text-decoration: none;
    }

    .signup-container p {
        margin-top: 15px;
        color: red;
        font-weight: 500;
    }
</style>
</head>
<body>

<div class="signup-container">
    <h2>Student Sign Up</h2>

    <!-- FORM (correct input names) -->
    <form method="post" action="/submit-signup">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="roll" placeholder="Roll No" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/student-login">Login</a>
    </div>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
