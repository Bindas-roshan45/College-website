<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Form</title>

<style>
/* General Page Styling */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
 
/* Container Box */
.container {
  background: #fff;
  padding: 30px 40px;
  border-radius: 12px;
  width: 100%;
  max-width: 550px;
  box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.15);
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 {
  color: #222;
  font-size: 32px;
  font-weight: 700;
  margin: 0 0 10px 0;
}
.header h2 {
  color: #555;
  font-size: 20px;
  font-weight: 500;
  margin: 0;
  letter-spacing: 0.5px;
}

/* Section Title */
.section-title {
  margin-top: 25px;
  margin-bottom: 12px;
  font-size: 20px;
  font-weight: 600;
  color: #333;
  border-bottom: 2px solid #4facfe;
  padding-bottom: 6px;
}

/* Input Fields */
form label {
  display: block;
  margin: 12px 0 5px;
  font-weight: 500;
  color: #444;
}

form input,
form select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 15px;
  transition: all 0.3s ease;
}

form input:focus,
form select:focus {
  border-color: #4facfe;
  outline: none;
  box-shadow: 0 0 6px rgba(79, 172, 254, 0.4);
}

/* Button */
button {
  width: 100%;
  margin-top: 22px;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  border: none;
  padding: 12px;
  font-size: 16px;
  font-weight: 600;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: linear-gradient(135deg, #3a8ef6, #00d2f7);
  transform: translateY(-2px);
  box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
}
</style>

</head>
<body>
<div class="header">
    <h1>Apply for Admission</h1>
    <h2>Fill the form below to submit your application</h2>
    
</div>
<div class="container">
<form action="/submit-application" method="post" enctype="multipart/form-data">
  <h2 class="section-title">Personal Details</h2>
  <label>Full Name:</label><input type="text" name="fullname" required>
  <label>Date of Birth:</label><input type="date" name="dob" required>
  <label>Email:</label><input type="email" name="email" required>
  <label>Phone Number:</label><input type="tel" name="phone" required>

  <h2 class="section-title">Academic Details</h2>
  <label>12th Board:</label><input type="text" name="board" required>
  <label>Year of Passing:</label>
  <select name="year" required>
    {% for y in range(2020, 2026) %}
      <option value="{{ y }}">{{ y }}</option>
    {% endfor %}
  </select>
  <label>Percentage:</label><input type="number" step="0.01" name="percentage" required>

  <h2 class="section-title">Course Details</h2>
  <label>Course Applying For:</label>
  <select name="course" required>
    <option value="">Select Course</option>
    <option value="BCA">BCA</option>
    <option value="BBA">BBA</option>
    <option value="B.Com">B.Com</option>
    <option value="B.Sc">B.Sc</option>
    <option value="B.Ed">B.Ed</option>
  </select>

  <label>Upload 12th Marksheet (PDF/JPG/PNG):</label>
  <input type="file" name="marksheet" required>

  <button type="submit">Submit Application</button>
</form>
</div>
</body>
</html>
