<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #4e54c8, #8f94fb, #6a11cb, #2575fc);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .login-container {
        background: #fff;
        padding: 40px 50px;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        width: 360px;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .login-container h2 {
        margin-bottom: 25px;
        color: #333;
        font-size: 26px;
    }

    .login-container input {
        width: 100%;
        padding: 14px 45px 14px 15px;
        margin: 12px 0;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 16px;
        transition: 0.3s;
    }

    .login-container input:focus {
        border-color: #4e54c8;
        box-shadow: 0 0 10px rgba(78, 84, 200, 0.5);
    }

    .password-container {
        position: relative;
        width: 100%;
    }

    .eye-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 18px;
    }

    .login-container button {
        width: 100%;
        padding: 14px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #4e54c8;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-container button:hover {
        background: #3b40a0;
    }

    .forgot-pass {
        margin-top: 10px;
        text-align: right;
        font-size: 14px;
    }

    .forgot-pass a {
        color: #4e54c8;
        text-decoration: none;
    }

    .login-container p {
        margin-top: 15px;
        color: red;
        font-weight: 500;
    }

    @media (max-width: 400px) {
        .login-container { width: 90%; padding: 30px 20px; }
    }
</style>
</head>
<body>
<div class="login-container">
    <h2>Student Login</h2>
    <form method="post" action="/student-login">
        <input type="text" name="roll_no" placeholder="Enter Roll No" autocomplete="username" required>

        <div class="password-container">
            <input id="password" type="password" name="password" placeholder="Enter Password" autocomplete="current-password" required>
        
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="forgot-pass">
        <a href="/forgot-password">Forgot Password?</a>
    </div>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    if (x.type === "password") { x.type = "text"; }
    else { x.type = "password"; }
}
</script>
</body>
</html>
