<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #4e54c8, #8f94fb, #6a11cb, #2575fc);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        padding: 20px;
        color: #333;
    }

    @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .dashboard-container {
        background: #fff;
        padding: 40px 50px;
        border-radius: 15px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        width: 400px;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .dashboard-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .dashboard-container h2 {
        color: #4e54c8;
        margin-bottom: 20px;
        font-size: 26px;
    }

    .dashboard-container p {
        font-size: 16px;
        margin: 8px 0;
        color: #555;
    }

    .dashboard-container a {
        display: block;
        margin: 15px 0;
        padding: 12px;
        background: #4e54c8;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s;
        font-size: 16px;
    }

    .dashboard-container a:hover {
        background: #3b40a0;
    }

    @media(max-width: 500px){
        .dashboard-container{
            width: 100%;
            padding: 30px 20px;
        }
    }
</style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Welcome, {{ student[2] }}</h2>
        <p>Roll No: {{ student[1] }}</p>
        <p>Email: {{ student[3] }}</p>

        <a href="/exam-schedule">📄 View Exam Schedule</a>
        <a href="/uploads">📥 Downloads</a>
        <a href="/notices">📢 Notice Board</a>
    </div>
</body>
</html>
